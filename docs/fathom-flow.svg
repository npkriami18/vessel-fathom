  <text x="989" y="346" fill="#344054" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700">Dismiss</text>
  <rect x="843" y="398" width="244" height="88" rx="8" fill="#f8fafc" stroke="#d8e0ea"/>
  <text x="865" y="429" fill="#121721" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">Agent queue</text>
  <text x="865" y="457" fill="#52606d" font-family="Inter, Segoe UI, sans-serif" font-size="14">1 approved item ready for poll</text>
