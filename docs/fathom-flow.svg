<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Fathom review chrome</title>
  <desc id="desc">A stylized screenshot showing an app frame, Fathom timeline, and approve or dismiss notification controls.</desc>
