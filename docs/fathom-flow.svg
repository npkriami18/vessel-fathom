  <circle cx="70" cy="64" r="6" fill="#ff6b6b"/>
  <circle cx="91" cy="64" r="6" fill="#ffd166"/>
  <circle cx="112" cy="64" r="6" fill="#58d68d"/>
  <text x="154" y="69" fill="#d8dee9" font-family="Inter, Segoe UI, sans-serif" font-size="15">Fathom review session: http://localhost:3000</text>
  <rect x="70" y="115" width="690" height="470" rx="8" fill="#fbfcfd" stroke="#d8e0ea"/>
  <text x="104" y="165" fill="#121721" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700">Checkout</text>
  <text x="104" y="205" fill="#52606d" font-family="Inter, Segoe UI, sans-serif" font-size="18">Button declares: navigates to /confirm</text>
  <rect x="104" y="250" width="210" height="56" rx="7" fill="#246bfe"/>
  <text x="143" y="285" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Checkout</text>
  <rect x="815" y="115" width="300" height="470" rx="8" fill="#ffffff" stroke="#d8e0ea"/>
  <text x="843" y="154" fill="#121721" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">Fathom</text>
  <rect x="843" y="180" width="88" height="34" rx="17" fill="#20242c"/>
  <text x="863" y="202" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="13">Notify</text>
  <rect x="942" y="180" width="84" height="34" rx="17" fill="#eef2f6"/>
  <text x="963" y="202" fill="#344054" font-family="Inter, Segoe UI, sans-serif" font-size="13">Timeline</text>
